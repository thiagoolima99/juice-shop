name: DAST - OWASP ZAP

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  dast-zap:
    name: DAST - OWASP ZAP (Juice Shop)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Juice Shop
        run: |
          docker run -d -p 3000:3000 --name juice-shop bkimminich/juice-shop
          echo "Aguardando Juice Shop iniciar..."
          sleep 40

      - name: Verify Juice Shop is running
        run: |
          curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q "200" && \
          echo "✅ Juice Shop está rodando" || \
          echo "⚠️ Juice Shop pode não estar pronto ainda"

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://localhost:3000'
          allow_issue_writing: false
          fail_action: false
        continue-on-error: true

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
          retention-days: 30

      - name: Stop Juice Shop
        if: always()
        run: docker stop juice-shop || true
